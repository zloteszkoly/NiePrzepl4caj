<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>NiePrzepłacaj</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Inter', Arial, sans-serif;
  background:#f8f7f7;
  color:#130086;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  margin:0;
}

/* NAGŁÓWEK */
h1 {
  font-size:64px;
  font-weight:700;
  margin:10px 0 20px 0;
}

/* PODTYTUŁ */
p {
  font-size:22px;
  margin-bottom:40px;
}

/* GŁÓWNY UKŁAD */
.container {
  display:flex;
  gap:40px;
  width:100%;
  max-width:1100px;
  align-items:flex-start;
}

/* LEWA STRONA – DUŻE KWADRATY */
.sidebar {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  width:400px;
}

.sidebar button {
  height:150px;
  font-size:20px;
  font-weight:700;
  text-transform:uppercase;
  background:white;
  border:3px solid #130086;
  border-radius:20px;
  cursor:pointer;
  transition:0.2s;
  color:#130086;
}

.sidebar button:hover {
  background:#e6e6ff;
}

.sidebar button.active {
  background:#130086;
  color:white;
}

/* PRAWA STRONA */
.main {
  flex:1;
}

.hidden { display:none; }

.main select,
.main input,
.main button {
  width:100%;
  height:60px;
  padding:0 15px;
  margin-bottom:20px;
  border:3px solid #130086;
  border-radius:15px;
  font-size:18px;
  font-family:'Inter',sans-serif;
  box-sizing:border-box;
}

/* SELECT – większa strzałka w dół */
.main select {
  appearance:none;
  background:white;
  background-image:url("data:image/svg+xml;utf8,<svg fill='%23130086' height='32' viewBox='0 0 24 24' width='32' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 15px center;
  background-size:28px;
}

.main button {
  background:#130086;
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.main button:hover {
  background:#0d0060;
}

/* WYNIK */
.result {
  margin-top:20px;
  border:3px solid #130086;
  border-radius:20px;
  padding:25px;
  font-size:18px;
  box-sizing:border-box;
}

.sub {
  margin-top:15px;
  padding-top:15px;
  border-top:1px solid #130086;
}
</style>
</head>
<body>

<h1>NiePrzepłacaj</h1>
<p>Wybierz kategorię produktu aby zobaczyć ile możesz oszczędzić</p>

<div class="container">
  <div class="sidebar" id="categories"></div>

  <div class="main hidden" id="app">
    <select id="product"></select>
    <input id="qty" type="number" placeholder="Ile razy w miesiącu kupujesz?">
    <button onclick="calc()">Policz oszczędności</button>
    <div class="result" id="result"></div>
  </div>
</div>

<script>
// --- DANE ---
const data = {
  "Napoje": {
    products:{
     "Coca-Cola 0.5L": {price:5.2, subs:{"Cola Original 0.5L":2.1, "Freeway Cola":2.1, "Hoop Cola 0.5L":2.2,"Mio Rio Cola 0.5L":2.2}},
     "Tymbark Jabłko-Mięta 0.5L": {price:3.5, subs:{"Riviva Jabłko-Mięta 0.5L":1.9}},
     "Lipton Lemon 0.5L": {price:4.6, subs:{"Solevita Ice Tea Cytryna 0.5L":2.1}},
     "Cisowianka Woda 0.5L": {price:2.9, subs:{"Żywiec Zdrój Woda 0.5L":2.6, "Kraina Wód Woda 0.5L":1.8, "Saguaro Woda 0.5L":1.6}},
     "Twist Bakoma": {price:4.5, subs:{"FarmMilk":3}},
     "Tymbark Sok Pomarańczowy 1L": {price:8.9, subs:{"Solevita Sok Pomarańczowy 1L":5.5, "Riviva Sok Pomarańczowy 1L":5.3, "Hortex Sok Pomarańczowy 1L":7.9}},
     "Nestea 1.5L": {price:7.9, subs:{"Freeway Ice Tea 1.5L":4.2, "Riviva Ice Tea 1.5L":4.0, "Oshee Ice Tea 1.5L":6.5}},
     "Oshee Isotonic 750ml": {price:4.5, subs:{"4Move Isotonic 750ml":3.9,"ActivLab Isotonic 750ml":3.5}},
     "Kubuś Play 400ml": {price:3.5, subs:{"Pysio 400ml":3.2,"Leon Sok 400ml":2.9,"Riviva Kids 400ml":2.8}},
     "Lipton Ice Tea 1.5L": {price:8.2, subs:{"Fuze Tea 1.5L":6,"Freeway Ice Tea 1.5L":4.2,"Nestea 1.5L":7.9}}
    }
  },
  "Jedzenie": {
    products:{
      "Kinder Bueno": {price:4.9, subs:{"Knoppers Bar":3.5, "Choco Fresh Bar":2.8, "Way To Go Wafer":2.5}},
      "Nutella 350g": {price:14.9, subs:{"Nutoka Krem 350g":7.5,"Choco Nussa 400g":8.9,"Magiczne Duo Krem 400g":6.9}},
      "Lay's Chips 140g": {price:7.9, subs:{"Snack Day Chips 150g":4.5,"Top Chips 150g":4.7,"Crunchips 140g":6.9}},
      "Milka Czekolada 100g": {price:6.5, subs:{"Fin Carre Czekolada 100g":3.9,"Moser Roth Czekolada 125g":5.0,"Schogetten Czekolada 100g":5.5}},
      "Makaron tagliatelle 500g": {price:4.5, subs:{"Makaron penne 500g":3.5,"Makaron świderki 500g":3.6,"Makaron spaghetti 500g":3.5}},
      "Ryż jaśminowy 1kg": {price:8.5, subs:{"Ryż parboiled 1kg":7.2,"Ryż biały 1kg":6.9,"Kasza jęczmienna 1kg":5.9}},
      "Pizza Dr. Oetker 380g": {price:12.9, subs:{"Pizza Guseppe 400g":10.9}},
      "Jogurt grecki 400g": {price:4.9, subs:{"Jogurt naturalny 400g":3.9,"Jogurt Pilos 400g":3.2,"Jogurt Bakoma 400g":4.2}},
      "Serek wiejski Piątnica": {price:3.5, subs:{"Serek wiejski Pilos":2.9,"Serek wiejski Bakoma":3.3}},
      "Parówki Berlinki": {price:8.9, subs:{"Parówki Morliny":7.9,"Parówki Pikok":5.9}},
    }
  },
  "Kosmetyki":{
    products:{
      "Szampon Nivea": {price:12, subs:{"Szampon Isana":6,"Balea Szampon 300ml":6.5,"Ziaja Szampon 300ml":7.9}},
      "Żel Dove": {price:9, subs:{"Żel BeBeauty":5}},
      "Nivea Creme 150ml": {price:15.5, subs:{"Isana Creme 150ml":6.5,"Ziaja Krem Uniwersalny 150ml":7.0,"Alterra Creme 150ml":8.5}},
      "Colgate Pasta 100ml": {price:9.5, subs:{"Dontodent Pasta 125ml":3.9,"Sensident Pasta 100ml":4.2,"Ziaja Mintperfekt 100ml":5.9}},
      "Rexona Dezodorant 150ml": {price:12.5, subs:{"Isana Dezodorant 150ml":5.5,"Balea Dezodorant 150ml":5.0}},
      "Pantene Szampon 400ml": {price:18.9, subs:{"Elseve Szampon 400ml":16.9,"Isana Szampon 300ml":6.9,"Balea Szampon 300ml":6.5}},
      "Nivea Żel pod prysznic 250ml": {price:10.9, subs:{"Palmolive Żel 250ml":9.9,"Isana Żel 300ml":6.5,"Balea Żel 300ml":6.5}},
      "Nivea Balsam do ciała 400ml": {price:18.9, subs:{"Ziaja Balsam 400ml":13.9,"Isana Balsam 400ml":10.9,"Balea Balsam 400ml":11.5}}
    }
  },
  "Środki Czystości":{
    products:{
      "Domestos 750ml":{price:10, subs:{"W5 Płyn 750ml":5.5}},
      "Fairy 450ml":{price:9, subs:{"Pur 450ml":6}},
      "Fairy Płyn do naczyń 450ml": {price:10.9, subs:{"Ludwik Płyn 450ml":7.5,"Pur Płyn 450ml":8.9,"W5 Płyn 500ml":4.9}},
      "Persil Proszek 3kg": {price:39.9, subs:{"Ariel Proszek 3kg":37.9,"Vizir Proszek 3kg":35.9,"Formil Proszek 3kg":24.9}},
      "Domestos 750ml": {price:10.5, subs:{"Duck WC Cleaner 750ml":9.5,"W5 WC Cleaner 750ml":6.5}},
      "Ajax Płyn do podłóg 1L": {price:9.9, subs:{"Ludwik Płyn uniwersalny 1L":8.5,"W5 Płyn do podłóg 1L":6.5,"Clinex Płyn 1L":9.5}},
      "Lenor Płyn do płukania 1L": {price:14.9, subs:{"Silan Płyn 1L":13.9,"Formil Płyn 1L":9.9}},
      "Velvet Papier 8 rolek": {price:14.9, subs:{"Foxy Papier 8 rolek":13.9,"Queen Papier 8 rolek":10.9}}
    }
  }
};

// --- ELEMENTY HTML ---
const catDiv = document.getElementById("categories");
const app = document.getElementById("app");
const prodSel = document.getElementById("product");
let currentCat;

// GENEROWANIE LISTY KATEGORII
for(let c in data){
  const btn = document.createElement("button");
  btn.textContent = c.toUpperCase();
  btn.onclick = function(e){ openCat(c, e); };
  catDiv.appendChild(btn);
}

function openCat(c, event){
  currentCat = c;
  app.classList.remove("hidden");

  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));
  event.currentTarget.classList.add("active");

  loadProducts();
}

function loadProducts(){
  prodSel.innerHTML = "";
  for(let p in data[currentCat].products){
    const opt = document.createElement("option");
    opt.textContent = p;
    prodSel.appendChild(opt);
  }
}

function calc(){
  const q = parseFloat(document.getElementById("qty").value);
  if(!q || q<=0){ alert("Podaj poprawną ilość"); return; }
  const p = prodSel.value;
  const item = data[currentCat].products[p];

  let html = `<div style="font-weight:700; font-size:20px;">${p}</div>`;
  html += `<div>Cena: ${item.price.toFixed(2)} zł</div>`;
  html += `<div>Miesięcznie wydajesz: ${(item.price*q).toFixed(2)} zł</div>`;
  html += `<div>Rocznie wydajesz: ${(item.price*q*12).toFixed(2)} zł</div>`;

  for(let s in item.subs){
    html += `<div class="sub">`;
    html += `<div style="font-weight:700;">${s}</div>`;
    html += `<div>Cena: ${item.subs[s].toFixed(2)} zł</div>`;
    html += `<div>Miesięcznie wydajesz: ${(item.subs[s]*q).toFixed(2)} zł</div>`;
    html += `<div>Rocznie wydajesz: ${(item.subs[s]*q*12).toFixed(2)} zł</div>`;
    html += `<div style="border-top:1px solid #130086; margin-top:5px; padding-top:5px;">`;
    const save = (item.price - item.subs[s])*q;
    html += `<div>Miesięcznie oszczędzasz: ${save.toFixed(2)} zł</div>`;
    html += `<div>Rocznie oszczędzasz: ${(save*12).toFixed(2)} zł</div>`;
    html += `</div></div>`;
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
